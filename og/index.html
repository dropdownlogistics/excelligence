<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Excelligence &mdash; OG Image</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0D1B2A;--card:#10202f;--card2:#0e1c2a;
  --cream:#F5F1EB;--steel:#6B7B8D;
  --crimson:#B23531;--gold:#D4A843;--blue:#6B9DC2;
  --border:rgba(245,241,235,0.07);
}
html,body{background:#000;min-height:100vh;font-family:'Space Grotesk',sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:24px}

/* The card is fixed at exactly 1200x630 — the OG spec.
   Screenshot this card to export the og-image.png. */
.og-card{
  width:1200px;height:630px;
  position:relative;overflow:hidden;
  background:var(--navy);
  color:var(--cream);
  display:flex;align-items:center;
  padding:0 88px;
  box-shadow:0 30px 80px rgba(0,0,0,0.55);
}

/* Subtle grid wash, same as the live site */
.og-card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(212,168,67,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(212,168,67,0.018) 1px,transparent 1px);
  background-size:48px 48px;
}

/* Diagonal crimson glow accent in the top-right */
.og-card::after{
  content:'';position:absolute;
  top:-180px;right:-180px;width:520px;height:520px;
  background:radial-gradient(circle,rgba(178,53,49,0.22) 0%,rgba(178,53,49,0) 65%);
  pointer-events:none;
}

/* LEFT — monogram in crimson ring */
.og-monogram{
  position:relative;z-index:2;
  width:240px;height:240px;flex-shrink:0;
  margin-right:64px;
}
.og-ring-outer{
  position:absolute;inset:0;
  border:2px solid rgba(178,53,49,0.85);
  border-radius:50%;
  box-shadow:
    0 0 60px rgba(178,53,49,0.32),
    inset 0 0 40px rgba(178,53,49,0.12);
}
.og-ring-mid{
  position:absolute;inset:14px;
  border:1px solid rgba(178,53,49,0.35);
  border-radius:50%;
  border-style:dashed;
}
.og-ring-inner{
  position:absolute;inset:36px;
  border:1px solid rgba(245,241,235,0.08);
  border-radius:50%;
  background:radial-gradient(circle at 50% 50%,rgba(178,53,49,0.08),transparent 70%);
}
.og-monogram .E{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;
  font-size:148px;font-weight:700;
  color:var(--cream);
  letter-spacing:-0.05em;
  line-height:1;
  text-shadow:
    0 0 36px rgba(178,53,49,0.55),
    0 4px 12px rgba(0,0,0,0.4);
}
.og-monogram .orbit-dot{
  position:absolute;width:10px;height:10px;border-radius:50%;
  background:var(--crimson);
  box-shadow:0 0 12px rgba(178,53,49,0.85);
}
.og-monogram .od-1{top:-5px;left:50%;margin-left:-5px}
.og-monogram .od-2{bottom:-5px;left:50%;margin-left:-5px;background:var(--gold);box-shadow:0 0 12px rgba(212,168,67,0.7)}
.og-monogram .od-3{top:50%;left:-5px;margin-top:-5px;background:var(--blue);box-shadow:0 0 12px rgba(107,157,194,0.7)}

/* RIGHT — wordmark + sub + url */
.og-text{
  position:relative;z-index:2;
  flex:1;
  display:flex;flex-direction:column;
  gap:0;
}
.og-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;
  color:var(--crimson);
  letter-spacing:0.22em;
  text-transform:uppercase;
  font-weight:500;
  margin-bottom:24px;
  display:flex;align-items:center;gap:14px;
}
.og-eyebrow::before{
  content:'';width:36px;height:1px;
  background:var(--crimson);
}
.og-wordmark{
  font-family:'Space Grotesk',sans-serif;
  font-size:108px;font-weight:700;
  letter-spacing:-0.045em;
  line-height:0.92;
  margin-bottom:22px;
  color:var(--cream);
}
.og-wordmark span{color:var(--crimson)}
.og-sub{
  font-family:'Space Grotesk',sans-serif;
  font-size:30px;font-weight:400;
  color:rgba(245,241,235,0.72);
  letter-spacing:-0.005em;
  line-height:1.35;
  max-width:560px;
}
.og-sub strong{color:var(--cream);font-weight:600}

/* BOTTOM bar */
.og-bottom{
  position:absolute;
  left:88px;right:88px;bottom:54px;
  z-index:2;
  display:flex;justify-content:space-between;align-items:center;
}
.og-url{
  font-family:'JetBrains Mono',monospace;
  font-size:22px;
  color:var(--cream);
  letter-spacing:0.04em;
  display:flex;align-items:center;gap:12px;
}
.og-url-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--crimson);
  box-shadow:0 0 14px rgba(178,53,49,0.8);
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.og-stamp{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:rgba(245,241,235,0.32);
  letter-spacing:0.18em;
  text-transform:uppercase;
}

/* Top corner registry tag */
.og-tag{
  position:absolute;
  top:54px;right:88px;
  z-index:2;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--gold);
  background:rgba(212,168,67,0.08);
  border:1px solid rgba(212,168,67,0.3);
  padding:6px 14px;
  border-radius:4px;
  letter-spacing:0.16em;
  text-transform:uppercase;
}

/* Faint grid overlay constraints panel — visible only outside the card */
.og-meta{
  position:fixed;top:14px;left:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:rgba(245,241,235,0.4);
  letter-spacing:0.08em;
  text-transform:uppercase;
}
</style>
</head>
<body>

<div class="og-meta">1200 &times; 630 &middot; OG preview &middot; Screenshot the card</div>

<div class="og-card">

  <span class="og-tag">FRM &middot; PTN &middot; ARC &middot; ANT</span>

  <div class="og-monogram">
    <div class="og-ring-outer"></div>
    <div class="og-ring-mid"></div>
    <div class="og-ring-inner"></div>
    <div class="E">E</div>
    <div class="orbit-dot od-1"></div>
    <div class="orbit-dot od-2"></div>
    <div class="orbit-dot od-3"></div>
  </div>

  <div class="og-text">
    <div class="og-eyebrow">Excelligence Registry</div>
    <h1 class="og-wordmark">Excel<span>ligence</span></h1>
    <p class="og-sub">The governed Excel <strong>knowledge graph</strong>.<br>Patterns, formulas, and architectures &mdash; typed, tiered, traversable.</p>
  </div>

  <div class="og-bottom">
    <div class="og-url">
      <span class="og-url-dot"></span>
      excelligence.dev
    </div>
    <div class="og-stamp">v1 &middot; Open Graph</div>
  </div>

</div>

</body>
</html>
